<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedaStaré</title>
  <style>
    :root{
      --bg:#030712;
      --gold:#d4af37;
      --blue:#69c7ff;
      --blue2:#3aa7ff;
      --white:#ffffff;
    }

    *{box-sizing:border-box}
    html,body{
      margin:0;
      padding:0;
      background:radial-gradient(circle at center, #07101f 0%, #02050d 45%, #010208 100%);
      overflow-x:hidden;
      height:520vh;
      font-family:Inter,system-ui,sans-serif;
    }

    .space{
      position:fixed;
      inset:0;
      pointer-events:none;
      overflow:hidden;
    }

    .gold-star{
      position:absolute;
      width:2px;
      height:2px;
      background:var(--gold);
      border-radius:50%;
      opacity:.7;
      animation:twinkle 2.8s ease-in-out infinite alternate;
      box-shadow:0 0 6px rgba(212,175,55,.35);
    }

    @keyframes twinkle{
      0%{opacity:.18; transform:scale(.8)}
      100%{opacity:1; transform:scale(1.25)}
    }

    .logo-wrap{
      position:fixed;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:25;
      pointer-events:none;
    }

    .logo-core{
      position:relative;
      transition:opacity .18s linear, transform .18s linear, filter .18s linear;
    }

    .logo-core img{
      width:min(42vw, 330px);
      display:block;
      filter:
        drop-shadow(0 0 12px rgba(255,215,255,.08))
        drop-shadow(0 0 36px rgba(212,175,55,.45))
        drop-shadow(0 0 78px rgba(88,170,255,.16));
    }

    .logo-aura{
      position:absolute;
      inset:-28%;
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(212,175,55,.18) 0%, rgba(58,167,255,.12) 28%, rgba(58,167,255,.04) 48%, transparent 72%);
      filter:blur(22px);
      animation:logoPulse 2.8s ease-in-out infinite alternate;
      z-index:-1;
    }

    @keyframes logoPulse{
      0%{transform:scale(.92); opacity:.55}
      100%{transform:scale(1.08); opacity:1}
    }

    .hero-layer{
      position:fixed;
      inset:0;
      pointer-events:none;
      perspective:1400px;
      z-index:20;
    }

    .blue-star{
      position:absolute;
      width:8px;
      height:8px;
      border-radius:50%;
      background:
        radial-gradient(circle, rgba(255,255,255,.98) 0%, rgba(128,214,255,.95) 24%, rgba(58,167,255,.8) 48%, rgba(58,167,255,.08) 80%, transparent 100%);
      box-shadow:
        0 0 10px rgba(105,199,255,.95),
        0 0 30px rgba(58,167,255,.75),
        0 0 65px rgba(58,167,255,.35);
      opacity:0;
      will-change:transform, opacity;
    }

    .dress{
      position:absolute;
      opacity:0;
      will-change:transform, opacity, filter;
    }

    .dress img{
      width:240px;
      display:block;
      filter:
        drop-shadow(0 0 18px rgba(120,210,255,.92))
        drop-shadow(0 0 42px rgba(58,167,255,.6))
        drop-shadow(0 0 90px rgba(58,167,255,.22));
    }

    .vignette{
      position:fixed;
      inset:0;
      pointer-events:none;
      z-index:5;
      background:
        radial-gradient(circle at center, transparent 42%, rgba(0,0,0,.18) 70%, rgba(0,0,0,.42) 100%);
    }
  </style>
</head>
<body>

  <div class="space" id="space"></div>

  <div class="logo-wrap">
    <div class="logo-core" id="logoCore">
      <div class="logo-aura"></div>
      <img src="medastare-logo.png" alt="MedaStaré logo" />
    </div>
  </div>

  <div class="hero-layer" id="heroLayer"></div>
  <div class="vignette"></div>

  <script>
    const space = document.getElementById("space");
    const heroLayer = document.getElementById("heroLayer");
    const logoCore = document.getElementById("logoCore");

    const dressImages = [
      "calestial-1.png",
      "calestial-2.png",
      "calestial-3.png",
      "calestial-4.png",
      "calestial-6.png",
      "calestial-7.png"
    ];

    // gold background stars
    for(let i=0;i<130;i++){
      const s = document.createElement("div");
      s.className = "gold-star";
      s.style.left = Math.random()*100 + "vw";
      s.style.top = Math.random()*100 + "vh";
      s.style.animationDelay = (Math.random()*2.6) + "s";
      s.style.opacity = (0.2 + Math.random()*0.7).toFixed(2);
      const size = (1 + Math.random()*2.2);
      s.style.width = size + "px";
      s.style.height = size + "px";
      space.appendChild(s);
    }

    // premium blue stars born from logo
    const blueStars = [];
    for(let i=0;i<20;i++){
      const el = document.createElement("div");
      el.className = "blue-star";
      heroLayer.appendChild(el);

      const angle = (i / 20) * Math.PI * 2;
      const radius = 18 + Math.random()*26;

      blueStars.push({
        el,
        baseX: 50 + Math.cos(angle) * radius,
        baseY: 50 + Math.sin(angle) * radius,
        drift: 12 + Math.random()*18,
        speed: 0.9 + Math.random()*0.35,
        size: 0.8 + Math.random()*1.1
      });
    }

    // dresses from star energy
    const dresses = dressImages.map((src, i) => {
      const el = document.createElement("div");
      el.className = "dress";
      const img = document.createElement("img");
      img.src = src;
      img.alt = "celestial dress";
      el.appendChild(img);
      heroLayer.appendChild(el);

      const angle = (i / dressImages.length) * Math.PI * 2;
      const radius = 24 + Math.random()*20;

      return {
        el,
        startX: 50 + Math.cos(angle) * radius,
        startY: 50 + Math.sin(angle) * radius,
        offset: i * 85,
        speed: 1 + Math.random()*0.2
      };
    });

    function clamp(v,min,max){ return Math.max(min, Math.min(max, v)); }
    function mapProgress(v, start, end){
      return clamp((v - start) / (end - start), 0, 1);
    }

    window.addEventListener("scroll", () => {
      const s = window.scrollY;

      // logo glow / fade
      const logoFade = clamp(1 - s / 520, 0, 1);
      const logoScale = 1 + clamp((220 - s) / 220, 0, 1) * 0.05;
      logoCore.style.opacity = logoFade;
      logoCore.style.transform = `scale(${logoScale})`;
      logoCore.style.filter = `brightness(${0.88 + logoFade*0.32})`;

      // phase 1: stars emerge from logo
      blueStars.forEach((star, i) => {
        const p = mapProgress(s, 40 + i*5, 340 + i*8);

        // appear softly then spread
        const spread = star.drift * p;
        const x = 50 + (star.baseX - 50) * (0.12 + p * 1.35);
        const y = 50 + (star.baseY - 50) * (0.12 + p * 1.35);

        let opacity = 0;
        if (p < 0.2) opacity = p / 0.2;
        else if (p < 0.82) opacity = 1;
        else opacity = 1 - ((p - 0.82) / 0.18);

        const scale = 0.35 + p * star.size * 1.8;

        star.el.style.left = `${x}%`;
        star.el.style.top = `${y}%`;
        star.el.style.opacity = opacity;
        star.el.style.transform = `translate(-50%,-50%) scale(${scale})`;
      });

      // phase 2: stars turn into dresses
      dresses.forEach((item, i) => {
        const start = 240 + item.offset;
        const end   = start + 330;
        const p = mapProgress(s, start, end);

        // invisible at first
        if (p === 0 || p === 1) {
          item.el.style.opacity = 0;
        }

        const x = 50 + (item.startX - 50) * (1 + p * 1.15);
        const y = 50 + (item.startY - 50) * (1 + p * 1.15);

        // Apple-like smooth arrival
        const scale = 0.18 + p * 2.15 * item.speed;

        // fade in, hold, then instant-feel cut
        let opacity = 0;
        if (p < 0.18) opacity = p / 0.18;
        else if (p < 0.74) opacity = 1;
        else if (p < 0.9) opacity = 1 - ((p - 0.74) / 0.16);
        else opacity = 0;

        const blur = p < 0.14 ? (1 - p / 0.14) * 4 : 0;

        item.el.style.left = `${x}%`;
        item.el.style.top = `${y}%`;
        item.el.style.opacity = opacity;
        item.el.style.transform = `
          translate(-50%,-50%)
          scale(${scale})
        `;
        item.el.style.filter = `
          blur(${blur}px)
          drop-shadow(0 0 18px rgba(120,210,255,.92))
          drop-shadow(0 0 42px rgba(58,167,255,.62))
          drop-shadow(0 0 90px rgba(58,167,255,.24))
        `;
      });
    });
  </script>
</body>
</html>
