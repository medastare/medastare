<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedaStaré</title>

<style>

body{
margin:0;
background:#02030a;
overflow-x:hidden;
height:500vh;
}

/* yıldızlar */

.star{
position:fixed;
width:2px;
height:2px;
background:#d4af37;
border-radius:50%;
animation:twinkle 2.5s infinite alternate;
}

@keyframes twinkle{
0%{opacity:.3}
100%{opacity:1}
}

/* LOGO */

.logo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:20;
}

.logo img{
width:300px;
animation:glow 2.5s infinite alternate;
}

@keyframes glow{
0%{filter:drop-shadow(0 0 10px #ffd700)}
100%{filter:drop-shadow(0 0 50px #ffd700)}
}

/* container */

.container{
position:fixed;
inset:0;
pointer-events:none;
perspective:1200px;
}

/* floating */

.float{
position:absolute;
opacity:0;
}

.float img{
width:240px;

/* HOLOGRAM GLOW */
filter:
drop-shadow(0 0 20px rgba(0,150,255,0.6))
drop-shadow(0 0 60px rgba(0,150,255,0.3));
}

</style>
</head>

<body>

<div class="logo" id="logo">
<img src="medastare-logo.png">
</div>

<div class="container" id="container"></div>

<script>

/* yıldız */

for(let i=0;i<120;i++){
const s=document.createElement("div")
s.className="star"
s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"
document.body.appendChild(s)
}

/* görseller */

const imgs=[
"calestial-1.png",
"calestial-2.png",
"calestial-3.png",
"calestial-4.png",
"calestial-6.png",
"calestial-7.png"
]

const container=document.getElementById("container")

const items=[]

imgs.forEach((src,i)=>{

const el=document.createElement("div")
el.className="float"

const img=document.createElement("img")
img.src=src

el.appendChild(img)
container.appendChild(el)

const angle=i/imgs.length*Math.PI*2

items.push({
el,
x:50+Math.cos(angle)*25,
y:50+Math.sin(angle)*25,
delay:i*120
})

})

/* SCROLL */

window.addEventListener("scroll",()=>{

const s=window.scrollY

/* LOGO FADE */

const logo=document.getElementById("logo")
logo.style.opacity=Math.max(0,1 - s/350)

/* APPLE STYLE FLOW */

items.forEach((it,i)=>{

const start=120 + i*90
const end=start + 260

if(s > start && s < end){

const progress=(s-start)/(end-start)

/* yavaş yaklaşma */
const scale=0.6 + progress * 1.8

/* hafif büyüme + center drift */
const spread=1 + progress * 1.2

const x=50+(it.x-50)*spread
const y=50+(it.y-50)*spread

/* opacity smooth + sudden cut */
let opacity=1

if(progress < 0.2) opacity=progress*4
if(progress > 0.75) opacity=1 - (progress-0.75)*4

/* SONDA ANİ KAYBOLMA */
if(progress > 0.9) opacity=0

it.el.style.opacity=opacity

it.el.style.left=x+"%"
it.el.style.top=y+"%"

it.el.style.transform=`
translate(-50%,-50%)
scale(${scale})
`

}else{

it.el.style.opacity=0

}

})

})

</script>

</body>
</html>
