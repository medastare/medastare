<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MedaStaré</title>

<style>

body{
margin:0;
background:#02030a;
overflow-x:hidden;
font-family:sans-serif;
}

/* hero alan */

.hero{
height:300vh;
position:relative;
}

/* yıldız arka plan */

.star{
position:fixed;
width:2px;
height:2px;
background:#d4af37;
border-radius:50%;
opacity:.8;
animation:twinkle 3s infinite ease-in-out alternate;
}

@keyframes twinkle{
0%{opacity:.2}
100%{opacity:1}
}

/* logo */

.logo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:10;
transition:opacity .4s, transform .4s;
}

.logo img{
width:320px;
filter:drop-shadow(0 0 35px #d4af37);
}

/* floating images */

.container{
position:fixed;
inset:0;
pointer-events:none;
perspective:1200px;
}

.float{
position:absolute;
will-change:transform,opacity;
}

.float img{
width:240px;
}

</style>
</head>

<body>

<section class="hero">

<div class="logo" id="logo">
<img src="medastare-logo.png">
</div>

<div class="container" id="floating"></div>

</section>

<script>

/* yıldız oluştur */

for(let i=0;i<120;i++){

const s=document.createElement("div")

s.className="star"

s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"

s.style.animationDelay=Math.random()*3+"s"

document.body.appendChild(s)

}

/* görseller */

const images=[
"calestial-1.png",
"calestial-2.png",
"calestial-3.png",
"calestial-4.png",
"calestial-6.png",
"calestial-7.png"
]

const container=document.getElementById("floating")

const items=[]

images.forEach((src,i)=>{

const angle=i/images.length*Math.PI*2
const radius=20+Math.random()*20

const el=document.createElement("div")
el.className="float"

const img=document.createElement("img")
img.src=src

el.appendChild(img)
container.appendChild(el)

items.push({

el,
startX:50+Math.cos(angle)*radius,
startY:50+Math.sin(angle)*radius,
z:600+i*200,
speed:.6+Math.random()*.4

})

})

/* scroll animasyonu */

window.addEventListener("scroll",()=>{

const s=window.scrollY

items.forEach(it=>{

const z=it.z-s*1.6*it.speed

const scale=1+(600-z)/350

const spread=1+(600-z)/800

const x=50+(it.startX-50)*spread
const y=50+(it.startY-50)*spread

let opacity=1

if(z<80) opacity=z/80

it.el.style.left=x+"%"
it.el.style.top=y+"%"

it.el.style.opacity=opacity

it.el.style.transform=
`translate(-50%,-50%) translateZ(${-z}px) scale(${scale})`

})

/* logo fade */

const logo=document.getElementById("logo")

logo.style.opacity=Math.max(0,1-s/400)

logo.style.transform=
`translate(-50%,-50%) scale(${1-s/1500})`

})

</script>

</body>
</html>
