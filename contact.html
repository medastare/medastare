<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MedaStaré</title>

<style>

body{
margin:0;
background:#02030a;
overflow-x:hidden;
}

/* yıldızlar */

.star{
position:fixed;
width:2px;
height:2px;
background:#d4af37;
border-radius:50%;
animation:twinkle 2.5s infinite alternate;
}

@keyframes twinkle{
0%{opacity:.2}
100%{opacity:1}
}

/* logo */

.logo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:20;
transition:all .3s;
}

.logo img{
width:320px;
animation:glow 2.5s infinite alternate;
}

@keyframes glow{
0%{filter:drop-shadow(0 0 10px #ffd700)}
100%{filter:drop-shadow(0 0 40px #ffd700)}
}

/* container */

.container{
position:fixed;
inset:0;
pointer-events:none;
perspective:1400px;
}

/* floating */

.float{
position:absolute;
will-change:transform,opacity;
}

.float img{
width:240px;
transform-style:preserve-3d;
}

</style>
</head>

<body>

<div class="logo" id="logo">
<img src="medastare-logo.png">
</div>

<div class="container" id="container"></div>

<script>

/* yıldız */

for(let i=0;i<120;i++){
const s=document.createElement("div")
s.className="star"
s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"
s.style.animationDelay=Math.random()*2+"s"
document.body.appendChild(s)
}

/* görseller */

const imgs=[
"calestial-1.png",
"calestial-2.png",
"calestial-3.png",
"calestial-4.png",
"calestial-6.png",
"calestial-7.png"
]

const container=document.getElementById("container")

const items=[]

imgs.forEach((src,i)=>{

const el=document.createElement("div")
el.className="float"

const img=document.createElement("img")
img.src=src

el.appendChild(img)
container.appendChild(el)

const angle=i/imgs.length*Math.PI*2
const radius=20+Math.random()*20

items.push({
el,
x:50+Math.cos(angle)*radius,
y:50+Math.sin(angle)*radius,
z:900+i*200,
rotation:Math.random()*20-10,
speed:.6+Math.random()*.4
})

})

/* scroll animasyon */

window.addEventListener("scroll",()=>{

const s=window.scrollY

items.forEach(it=>{

const z=it.z - s*2*it.speed

/* SCALE (yaklaşma efekti) */
const scale=Math.max(0.3, 3 - z/300)

/* ROTATE 3D */
const rotateY=(z/10)%360
const rotateX=(z/20)%360

/* yayılma */
const spread=1+(1-z/800)

const x=50+(it.x-50)*spread
const y=50+(it.y-50)*spread

/* opacity - tam kaybolma fix */
let opacity=1
if(z<100) opacity=z/100
if(z<0) opacity=0

/* tamamen yok et */
if(opacity<=0){
it.el.style.display="none"
return
}else{
it.el.style.display="block"
}

it.el.style.left=x+"%"
it.el.style.top=y+"%"

it.el.style.opacity=opacity

it.el.style.transform=`
translate(-50%,-50%)
translateZ(${-z}px)
scale(${scale})
rotateY(${rotateY}deg)
rotateX(${rotateX}deg)
rotate(${it.rotation}deg)
`

})

/* LOGO EFFECT */

const logo=document.getElementById("logo")

const fade=Math.max(0,1 - s/400)

logo.style.opacity=fade

logo.style.transform=`
translate(-50%,-50%)
scale(${1 + (fade*0.2)})
`

})

</script>

</body>
</html>
