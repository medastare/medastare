<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedaStaré</title>

<style>

body{
margin:0;
background:#02030a;
overflow-x:hidden;
height:500vh; /* scroll alan */
}

/* yıldızlar */

.star{
position:fixed;
width:2px;
height:2px;
background:#d4af37;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
0%{opacity:.2}
100%{opacity:1}
}

/* LOGO */

.logo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:20;
}

.logo img{
width:300px;
animation:glow 2s infinite alternate;
}

@keyframes glow{
0%{filter:drop-shadow(0 0 10px #ffd700)}
100%{filter:drop-shadow(0 0 50px #ffd700)}
}

/* container */

.container{
position:fixed;
inset:0;
pointer-events:none;
perspective:1200px;
}

/* floating */

.float{
position:absolute;
opacity:0; /* BAŞTA GÖRÜNMEZ */
}

.float img{
width:240px;
}

</style>
</head>

<body>

<div class="logo" id="logo">
<img src="medastare-logo.png">
</div>

<div class="container" id="container"></div>

<script>

/* yıldız */

for(let i=0;i<120;i++){
const s=document.createElement("div")
s.className="star"
s.style.left=Math.random()*100+"vw"
s.style.top=Math.random()*100+"vh"
document.body.appendChild(s)
}

/* görseller */

const imgs=[
"calestial-1.png",
"calestial-2.png",
"calestial-3.png",
"calestial-4.png",
"calestial-6.png",
"calestial-7.png"
]

const container=document.getElementById("container")

const items=[]

imgs.forEach((src,i)=>{

const el=document.createElement("div")
el.className="float"

const img=document.createElement("img")
img.src=src

el.appendChild(img)
container.appendChild(el)

const angle=i/imgs.length*Math.PI*2

items.push({
el,
x:50+Math.cos(angle)*20,
y:50+Math.sin(angle)*20,
delay:i*100
})

})

/* SCROLL ANIMATION */

window.addEventListener("scroll",()=>{

const s=window.scrollY

/* LOGO FADE */

const logo=document.getElementById("logo")
logo.style.opacity=Math.max(0,1 - s/300)

/* BURST EFFECT */

items.forEach((it,i)=>{

/* sadece belirli scroll aralığında çalış */
if(s > 100 + i*40 && s < 400 + i*40){

const progress=(s - (100 + i*40)) / 200

/* hızlı büyüme */
const scale=progress * 6

/* patlayarak yayılma */
const spread=1 + progress * 4

const x=50+(it.x-50)*spread
const y=50+(it.y-50)*spread

/* opacity: hızlı görün + kaybol */
let opacity=1
if(progress < 0.2) opacity=progress*5
if(progress > 0.8) opacity=(1-progress)*5

it.el.style.opacity=opacity

it.el.style.left=x+"%"
it.el.style.top=y+"%"

it.el.style.transform=`
translate(-50%,-50%)
scale(${scale})
rotate(${progress*180}deg)
`

}else{

it.el.style.opacity=0

}

})

})

</script>

</body>
</html>
