<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MedaAI StarCard — MedaStaré</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">

<style>

/* -------- GLOBAL -------- */
body {
    margin: 0;
    background: #000;
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    color: white;
}

/* -------- LUXURY COSMIC BACKGROUND -------- */
.bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, #0d0d1a 0%, #000 80%);
    overflow: hidden;
    z-index: -3;
}

/* Layer 1 — slow gold dust */
.bg::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url("https://www.transparenttextures.com/patterns/golden-dust.png");
    opacity: 0.18;
    animation: drift1 22s linear infinite;
}

@keyframes drift1 {
    0% {transform: translateY(0);}
    100% {transform: translateY(-450px);}
}

/* Layer 2 — faint nebula */
.bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background: url("https://i.ibb.co/ky88VYR/nebula-blue.png") center/cover no-repeat;
    opacity: 0.14;
    animation: drift2 40s linear infinite;
}

@keyframes drift2 {
    0% {transform: scale(1) translateY(0);}
    100% {transform: scale(1.3) translateY(-500px);}
}

/* -------- CARD -------- */
.card {
    width: 90%;
    max-width: 620px;
    margin: 100px auto;
    padding: 32px 28px;
    border-radius: 26px;
    background: rgba(15,15,25,0.55);
    border: 1px solid rgba(255,215,0,0.25);
    backdrop-filter: blur(20px);
    box-shadow: 0 0 50px rgba(255,215,0,0.18);
    animation: fadeIn 1s ease forwards;
    position: relative;
    overflow: hidden;
}

/* inner glow border */
.card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 26px;
    padding: 2px;
    background: linear-gradient(90deg, #ffd70066, #ff6bd655, #ffd70066);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    animation: borderGlow 5s linear infinite;
}

@keyframes borderGlow {
    0% {opacity: 0.6;}
    50% {opacity: 1;}
    100% {opacity: 0.6;}
}

@keyframes fadeIn {
    from {opacity:0; transform: translateY(25px);}
    to {opacity:1; transform: translateY(0);}
}

/* -------- HOLOGRAM STAR (SUPER PREMIUM) -------- */
.holo-star {
    width: 150px;
    height: 150px;
    margin: 0 auto 20px;
    background-image: url("https://i.ibb.co/f1RhVfg/star-gold.png");
    background-size: contain;
    background-repeat: no-repeat;
    filter: drop-shadow(0 0 22px rgba(255,215,0,0.9));
    animation: starPulse 3.5s ease-in-out infinite, starTilt 7s ease-in-out infinite;
}

@keyframes starPulse {
    0% {transform: scale(1); opacity: 0.9;}
    50% {transform: scale(1.12); opacity: 1;}
    100% {transform: scale(1); opacity: 0.9;}
}

@keyframes starTilt {
    0% {transform: rotate(0deg);}
    50% {transform: rotate(4deg);}
    100% {transform: rotate(0deg);}
}

/* -------- TEXT -------- */
.loading {
    text-align: center;
    opacity: 0.7;
    font-size: 14px;
    margin-bottom: 15px;
    animation: blink 1.7s infinite;
}

@keyframes blink {
    0%,100% {opacity:0.5;}
    50% {opacity:1;}
}

.name {
    text-align: center;
    font-family: 'Playfair Display';
    font-size: 46px;
    color: #ffd700;
    margin-bottom: 22px;
    letter-spacing: 1px;
    text-shadow: 0 0 18px rgba(255,215,0,0.45);
}

.output {
    font-size: 18px;
    line-height: 1.6;
    white-space: pre-line;
    min-height: 200px;
}

/* -------- BUTTONS -------- */
.btn-box {
    display: flex;
    justify-content: center;
    gap: 16px;
    margin-top: 26px;
}

button {
    padding: 12px 32px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    background: linear-gradient(90deg, #ffd700, #ff6bd6);
    color: #000;
    transition: 0.25s;
}

button:hover { transform: scale(1.08); }

</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

    <div class="holo-star"></div>

    <div class="loading" id="loadingText">MedaAI is generating your Star…</div>

    <div class="name" id="starName"></div>

    <div class="output" id="outputBox"></div>

    <div class="btn-box">
        <button onclick="generate()">Yeni Üret</button>
        <button onclick="toggleLang()">EN / TR</button>
    </div>

</div>

<script>

/* --------------------------
   GLOBAL VARIABLES
-------------------------- */
let lang = "tr";
let currentName = "";
let currentMottoTR = "";
let currentKombinTR = "";

/* --------------------------
   STAR NAME GENERATOR
-------------------------- */
function generateStarName() {
    const prefix = ["A", "O", "E", "Astra", "Ély", "Lun", "Ser", "Va", "Oph", "Nai", "Vé", "Aure"];
    const core   = ["lea", "stra", "thea", "vara", "lyra", "ria", "naé", "vona", "reia", "luna"];
    const suffix = ["a", "éa", "ira", "elle", "xa", "ora", "aya", "ia"];

    return prefix.random() + core.random() + suffix.random();
}

/* RANDOM CHOICE HELPER */
Array.prototype.random = function() {
    return this[Math.floor(Math.random() * this.length)];
};

/* --------------------------
   MOTTO GENERATOR (TR)
-------------------------- */
function generateMottoTR() {
    const part1 = ["Auran", "Zarafetin", "Işığın", "Sessiz gücün", "Kalbin"];
    const part2 = ["odayı değiştirir", "herkesi susturur", "parıldar", "yol açar", "iz bırakır"];
    const part3 = ["ve asla kaybolmaz.", "ve her şeyi dönüştürür.", "sen konuşmadan anlatır."];

    return `${part1.random()} ${part2.random()} ${part3.random()}`;
}

/* --------------------------
   MOTTO TRANSLATION (EN)
-------------------------- */
function translateMottoToEN(t) {
    return t
        .replace("Auran","Your aura")
        .replace("Zarafetin","Your elegance")
        .replace("Işığın","Your light")
        .replace("Sessiz gücün","Your silent power")
        .replace("Kalbin","Your heart")
        .replace("odayı değiştirir","changes the room")
        .replace("herkesi susturur","silences everyone")
        .replace("parıldar","shines")
        .replace("yol açar","opens paths")
        .replace("iz bırakır","leaves a mark")
        .replace("ve asla kaybolmaz.","and never gets lost.")
        .replace("ve her şeyi dönüştürür.","and transforms everything.")
        .replace("sen konuşmadan anlatır.","and tells your story without words.");
}

/* --------------------------
   KOMBİN (TR)
-------------------------- */
function generateKombinTR() {
    const main = ["Siyah saten elbise", "Krem blazer takım", "Silver slip elbise", "Taupe trench coat", "Kırmızı drape elbise"];
    const acc  = ["Gold spiral küpe", "Mini gold bag", "Pearl clutch", "Silver hoops"];
    const hair = ["Sleek low bun", "Soft glam waves", "High elegant ponytail"];
    const shoe = ["Nude stiletto", "Metallic heels", "Pointed boots"];

    return `• ${main.random()}\n• ${acc.random()}\n• ${hair.random()}\n• ${shoe.random()}`;
}

/* --------------------------
   KOMBİN TRANSLATION (EN)
-------------------------- */
function translateKombinToEN(t) {
    return t
        .replace("Siyah saten elbise","Black satin dress")
        .replace("Krem blazer takım","Cream blazer set")
        .replace("Silver slip elbise","Silver slip dress")
        .replace("Taupe trench coat","Taupe trench coat")
        .replace("Kırmızı drape elbise","Red drape dress")
        .replace("Gold spiral küpe","Gold spiral earrings")
        .replace("Mini gold bag","Mini gold bag")
        .replace("Pearl clutch","Pearl clutch")
        .replace("Silver hoops","Silver hoops")
        .replace("Sleek low bun","Sleek low bun")
        .replace("Soft glam waves","Soft glam waves")
        .replace("High elegant ponytail","High elegant ponytail")
        .replace("Nude stiletto","Nude stiletto")
        .replace("Metallic heels","Metallic heels")
        .replace("Pointed boots","Pointed boots");
}

/* --------------------------
   MAIN GENERATE
-------------------------- */
function generate() {

    document.getElementById("loadingText").style.opacity = 1;

    setTimeout(() => {

        currentName = generateStarName();
        currentMottoTR = generateMottoTR();
        currentKombinTR = generateKombinTR();

        writeCard();

        document.getElementById("loadingText").style.opacity = 0;

    }, 600);
}

/* --------------------------
   WRITE TO SCREEN
-------------------------- */
function writeCard() {

    const nameBox = document.getElementById("starName");
    const outBox = document.getElementById("outputBox");

    nameBox.textContent = currentName + " ✦";

    if (lang === "tr") {
        outBox.textContent =
            `✦ Motto:\n${currentMottoTR}\n\n✦ MedAI Kombin Önerisi:\n${currentKombinTR}`;
    } else {
        outBox.textContent =
            `✦ Motto:\n${translateMottoToEN(currentMottoTR)}\n\n✦ MedAI Outfit Suggestion:\n${translateKombinToEN(currentKombinTR)}`;
    }
}

/* --------------------------
   LANGUAGE TOGGLE
-------------------------- */
function toggleLang() {
    lang = (lang === "tr") ? "en" : "tr";
    writeCard();
}

/* INITIAL START */
generate();

</script>

</body>
</html>
