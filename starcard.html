<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MedaAI StarCard™ — MedaStaré</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

/* ---------------- GLOBAL ---------------- */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
    overflow-x: hidden;
}

/* 🔥 BOZUK IMGUR RESİMLERİNİ OTOMATİK YOK EDEN FİLTRE 🔥 */
img[src*="imgur"],
img[src*="imgbb"],
img[src*="not"],
img[src*="image"] {
    display: none !important;
    opacity: 0 !important;
    visibility: hidden !important;
    width: 0 !important;
    height: 0 !important;
}

/* ---------------- BACKGROUND ANIMATION ---------------- */
.bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, #05050d 0%, #000 85%);
    overflow: hidden;
    z-index: -1;
}

/* Arkaya ekstra derinlik için iki katman */
.bg::before,
.bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url("https://assets.codepen.io/1468070/Stars.svg");
    background-size: cover;
    animation: starsFlow 38s linear infinite;
}

.bg::after {
    opacity: 0.22;
    animation-duration: 55s;
}

@keyframes starsFlow {
    0% { transform: translateY(0) rotate(0deg); }
    100% { transform: translateY(-900px) rotate(2deg); }
}

/* ---------------- MAIN CARD ---------------- */
.card {
    width: 92%;
    max-width: 620px;
    margin: 120px auto;
    padding: 40px 32px;
    border-radius: 28px;

    background: rgba(22,18,35,0.52);
    border: 1px solid rgba(255,215,0,0.32);
    backdrop-filter: blur(18px);
    box-shadow: 0 0 55px rgba(255,215,0,0.25);

    animation: cardEnter 0.9s ease forwards;
}

@keyframes cardEnter {
    0% { transform: scale(0.92) translateY(30px); opacity: 0; }
    100% { transform: scale(1) translateY(0); opacity: 1; }
}

.color-transition {
    transition: background 0.9s ease, border-color 0.9s ease, box-shadow 0.9s ease;
}

/* ---------------- STAR CARD TITLE (YENİ) ---------------- */
.top-title {
    text-align: center;
    font-size: 26px;
    font-weight: 600;
    letter-spacing: 1px;
    color: white;
    opacity: 0.92;
    margin-bottom: 20px;
    text-shadow: 0 0 12px rgba(255,255,255,0.55);
}

/* ---------------- STAR HOLOGRAM ---------------- */
.holo-star {
    width: 165px;
    height: 165px;
    margin: 0 auto 25px;
    background-image: url("https://i.imgur.com/mWbJY1Q.png");
    background-size: contain;
    background-repeat: no-repeat;

    filter: drop-shadow(0 0 22px rgba(255,215,0,0.75));
    animation: holoPulse 3.2s ease-in-out infinite;
}

@keyframes holoPulse {
    0% { transform: scale(1) rotate(0deg); opacity: 0.85; }
    50% { transform: scale(1.08) rotate(5deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 0.85; }
}

/* ---------------- LOADING ---------------- */
.loading {
    text-align: center;
    opacity: 0.7;
    font-size: 15px;
    margin-bottom: 15px;
    animation: blink 1.7s infinite;
}
@keyframes blink {
    0%,100% { opacity: .55; }
    50% { opacity: 1; }
}

/* ---------------- STAR NAME ---------------- */
.name {
    text-align: center;
    font-family: 'Playfair Display';
    font-size: 48px;
    margin-bottom: 22px;
    color: #ffd700;
    text-shadow: 0 0 14px rgba(255,215,0,0.85);
}

/* ---------------- OUTPUT ---------------- */
.output {
    font-size: 18px;
    line-height: 1.75;
    white-space: pre-line;
    min-height: 230px;
}

/* ---------------- BUTTONS ---------------- */
.btn-box {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-top: 28px;
}

button {
    padding: 13px 30px;
    background: linear-gradient(90deg, #ffd700, #ff6bd6);
    border-radius: 32px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    color: #000;
    transition: .25s;
}

button:hover {
    transform: scale(1.07);
}

</style>
</head>

<body>

<div class="bg"></div>

<div id="cardBox" class="card color-transition">

    <div class="top-title">MedaAI StarCard™</div>

    <div class="holo-star"></div>

    <div class="loading" id="loadingText">MedaAI is generating your Star…</div>

    <div class="name" id="starName"></div>

    <div class="output" id="outputBox"></div>

    <div class="btn-box">
        <button onclick="generate()">Yeni Üret</button>
        <button onclick="toggleLang()">EN / TR</button>
    </div>
</div>

<script>
let lang = "tr";

/* ---------------- COLOR THEMES ---------------- */
const cardColors = [
    { bg:"rgba(30,25,60,0.55)", border:"rgba(255,215,0,0.35)", glow:"rgba(255,215,0,0.23)" },
    { bg:"rgba(40,15,45,0.55)", border:"rgba(255,105,180,0.40)", glow:"rgba(255,105,180,0.28)" },
    { bg:"rgba(10,30,50,0.55)", border:"rgba(0,200,255,0.42)", glow:"rgba(0,200,255,0.30)" },
    { bg:"rgba(45,22,12,0.55)", border:"rgba(255,140,0,0.42)", glow:"rgba(255,140,0,0.30)" },
    { bg:"rgba(25,15,40,0.55)", border:"rgba(180,70,255,0.45)", glow:"rgba(180,70,255,0.32)" }
];

/* ---------------- STAR NAME GEN ---------------- */
const prefix = ["A","E","O","L","Ar","El","No","Au","Ser","Vé","Lu","My","Astra","Nai","Oph","Ély"];
const core   = ["leï","stra","ria","lune","via","thea","lyra","vara","naé","raya","vona","phira","zea"];
const suffix = ["a","éa","ia","ra","xa","aya","ira","elle","aé","ora","éssa"];

function generateStarName(){
    return prefix.random()+core.random()+suffix.random();
}

/* ---------------- MOTTO GEN ---------------- */
function generateMottoTR(){
    const p1=["Işığın","Zarafetin","Auran","Sessiz gücün","Gölgen","Kalbin","Stilin"];
    const p2=["karanlığı deler","herkesi susturur","odayı değiştirir","yükselir","parıldar","iz bırakır","dünyayı sakinleştirir"];
    const p3=["asla kaybolmaz.","her şeyi dönüştürür.","yeni yollar açar.","konuşmadan anlatır.","seni öne çıkarır.","gözleri sana çevirir."];
    return `${p1.random()} ${p2.random()} ve ${p3.random()}`;
}

function generateMottoEN(){
    return generateMottoTR()
        .replace("Işığın","Your light")
        .replace("Zarafetin","Your elegance")
        .replace("Auran","Your aura")
        .replace("Sessiz gücün","Your silent power")
        .replace("Gölgen","Your shadow")
        .replace("Kalbin","Your heart")
        .replace("Stilin","Your style")
        .replace("karanlığı deler","cuts through darkness")
        .replace("herkesi susturur","silences everyone")
        .replace("odayı değiştirir","changes the room")
        .replace("yükselir","rises")
        .replace("parıldar","glows")
        .replace("iz bırakır","leaves a mark")
        .replace("dünyayı sakinleştirir","calms the world")
        .replace("asla kaybolmaz.","never gets lost.")
        .replace("her şeyi dönüştürür.","transforms everything.")
        .replace("yeni yollar açar.","opens new paths.")
        .replace("konuşmadan anlatır.","speaks without words.")
        .replace("seni öne çıkarır.","makes you stand out.")
        .replace("gözleri sana çevirir.","turns all eyes to you.");
}

/* ---------------- OUTFIT GEN ---------------- */
const mainTR = [
    "Siyah kaşmir kaban",
    "Krem yün blazer takım",
    "Gri fitilli balıkçı kazak",
    "Taupe uzun trench coat",
    "Siyah deri midi etek",
    "Beyaz kaşmir kazak elbise",
    "Antrasit teddy coat",
    "Koyu vizon kürk görünümlü mont"
];

const accTR = [
    "Altın spiral küpe",
    "İnci taşlı mini çanta",
    "Gri yün bere",
    "Gold detaylı deri eldiven",
    "Silver hoop küpeler",
    "Zincir detaylı çanta",
    "Kürk yaka aksesuar"
];

const hairTR = [
    "Sleek low bun",
    "Soft dalga",
    "Yandan ayrık fön",
    "High ponytail",
    "Natural wave",
    "Wet look"
];

const shoeTR = [
    "Siyah diz üstü çizmeler",
    "Nude stiletto",
    "Kısa topuklu deri bot",
    "Krem platform bot",
    "Metallic heels",
    "Pointed boots"
];

function generateOutfitTR(){
    return `• ${mainTR.random()}
• ${accTR.random()}
• ${hairTR.random()}
• ${shoeTR.random()}`;
}

function generateOutfitEN(){
    return generateOutfitTR()
        .replace("Siyah kaşmir kaban","Black cashmere coat")
        .replace("Krem yün blazer takım","Cream wool blazer set")
        .replace("Gri fitilli balıkçı kazak","Gray ribbed turtleneck")
        .replace("Taupe uzun trench coat","Taupe long trench coat")
        .replace("Siyah deri midi etek","Black leather midi skirt")
        .replace("Beyaz kaşmir kazak elbise","White cashmere knit dress")
        .replace("Antrasit teddy coat","Anthracite teddy coat")
        .replace("Koyu vizon kürk görünümlü mont","Dark mink faux-fur coat")

        .replace("Altın spiral küpe","Gold spiral earrings")
        .replace("İnci taşlı mini çanta","Pearl mini bag")
        .replace("Gri yün bere","Gray wool beanie")
        .replace("Gold detaylı deri eldiven","Gold-detailed leather gloves")
        .replace("Silver hoop küpeler","Silver hoop earrings")
        .replace("Zincir detaylı çanta","Chain-detailed bag")
        .replace("Kürk yaka aksesuar","Fur collar accessory")

        .replace("Siyah diz üstü çizmeler","Black over-knee boots")
        .replace("Kısa topuklu deri bot","Low-heel leather boots")
        .replace("Krem platform bot","Cream platform boots")
        .replace("Nude stiletto","Nude stiletto")
        .replace("Metallic heels","Metallic heels")
        .replace("Pointed boots","Pointed boots");
}

/* ---------------- RANDOM HELPER ---------------- */
Array.prototype.random = function(){
    return this[Math.floor(Math.random()*this.length)];
};

/* ---------------- COLOR CHANGE ---------------- */
function changeCardColor(){
    const c = cardColors.random();
    const card = document.getElementById("cardBox");

    card.style.background = c.bg;
    card.style.borderColor = c.border;
    card.style.boxShadow = `0 0 65px ${c.glow}`;
}

/* ---------------- GENERATE FUNCTION ---------------- */
function generate(){
    document.getElementById("loadingText").style.opacity = 1;

    changeCardColor();

    setTimeout(()=>{
        const star = generateStarName();
        const motto = (lang==="tr") ? generateMottoTR() : generateMottoEN();
        const outfit = (lang==="tr") ? generateOutfitTR() : generateOutfitEN();

        document.getElementById("starName").textContent = star + " ✦";
        document.getElementById("outputBox").textContent =
            (lang==="tr" ? "✦ Motto:\n" : "✦ Motto:\n") +
            motto +
            "\n\n" +
            (lang==="tr" ? "✦ MedAI Kombin Önerisi:\n" : "✦ MedAI Outfit Suggestion:\n") +
            outfit;

        document.getElementById("loadingText").style.opacity = 0;

    }, 750);
}

/* ---------------- LANGUAGE TOGGLE ---------------- */
function toggleLang(){
    lang = (lang === "tr") ? "en" : "tr";
    generate();
}

/* Auto load */
generate();
</script>

</body>
</html>
