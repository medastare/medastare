<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MedaAI StarCard™ — MedaStaré</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: #000;
    font-family: 'Plus Jakarta Sans', sans-serif;
    overflow-x: hidden;
    color: #fff;
}

/* ------------------ ANIMATED BACKGROUND (NO IMAGES) ------------------ */
.bg-stars {
    position: fixed;
    inset: 0;
    overflow: hidden;
    z-index: -1;
}

.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: radial-gradient(circle, #ffd700, rgba(255,215,0,0));
    border-radius: 50%;
    animation: floatStar linear infinite;
}

@keyframes floatStar {
    0% { transform: translateY(0); opacity: 0.2; }
    50% { opacity: 1; }
    100% { transform: translateY(-800px); opacity: 0; }
}

/* ------------------ CARD ------------------ */
.card {
    width: 92%;
    max-width: 620px;
    margin: 140px auto;
    padding: 40px 34px;
    border-radius: 30px;
    background: rgba(20,18,30,0.55);
    border: 1px solid rgba(255,215,0,0.4);
    backdrop-filter: blur(18px);
    box-shadow: 0 0 60px rgba(255,215,0,0.25);
    animation: fadeIn .9s ease;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px) scale(.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ------------------ TITLE ------------------ */
.top-title {
    text-align: center;
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 20px;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
}

/* ------------------ HOLOGRAM (PURE CSS) ------------------ */
.holo-star {
    width: 150px;
    height: 150px;
    margin: 0 auto 25px;
    border-radius: 50%;
    background: radial-gradient(circle,
        rgba(255,215,0,0.55),
        rgba(255,215,0,0.15),
        rgba(255,215,0,0.05)
    );
    box-shadow:
        0 0 30px rgba(255,215,0,0.5),
        0 0 60px rgba(255,215,0,0.4),
        inset 0 0 20px rgba(255,215,0,0.4);
    animation: pulse 3s infinite ease-in-out;
}

@keyframes pulse {
    0% { transform: scale(1); opacity: .9; }
    50% { transform: scale(1.08); opacity: 1; }
    100% { transform: scale(1); opacity: .9; }
}

/* ------------------ STAR NAME ------------------ */
.name {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 52px;
    margin-bottom: 25px;
    color: #ffd700;
    text-shadow: 0 0 16px rgba(255,215,0,0.85);
}

/* ------------------ TEXT ------------------ */
.output {
    font-size: 19px;
    line-height: 1.7;
    min-height: 240px;
}

/* ------------------ BUTTONS ------------------ */
.btn-box {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-top: 30px;
}

button {
    padding: 13px 32px;
    background: linear-gradient(90deg, #ffd700, #ff69d9);
    border-radius: 32px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    font-size: 15px;
    color: #000;
    transition: .25s;
}
button:hover {
    transform: scale(1.08);
}
</style>
</head>

<body>

<!-- ---- Animated Background ---- -->
<div class="bg-stars" id="bgStars"></div>

<div id="cardBox" class="card">
    <div class="top-title">MedaAI StarCard™</div>
    <div class="holo-star"></div>

    <div id="loadingText" style="text-align:center;opacity:.7;margin-bottom:20px;">
        MedaAI is generating your Star…
    </div>

    <div class="name" id="starName"></div>
    <div class="output" id="outputBox"></div>

    <div class="btn-box">
        <button onclick="generate()">Yeni Üret</button>
        <button onclick="toggleLang()">EN / TR</button>
    </div>
</div>

<script>
let lang = "tr";

Array.prototype.random = function(){
    return this[Math.floor(Math.random()*this.length)];
};

/* --- Create animated stars --- */
function initStars(){
    const container = document.getElementById("bgStars");
    container.innerHTML = "";
    for(let i=0;i<80;i++){
        const s = document.createElement("div");
        s.classList.add("star");
        s.style.left = Math.random()*100+"%";
        s.style.top = (Math.random()*100+50)+"%";
        s.style.animationDuration = (10+Math.random()*20)+"s";
        container.appendChild(s);
    }
}
initStars();

/* --- Star Name --- */
const prefix = ["A","E","O","L","Ar","El","No","Au","Ser","Vé","Lu","My","Astra","Nai","Oph","Ély"];
const core   = ["leï","stra","ria","lune","via","thea","lyra","vara","naé","raya","vona","phira","zea"];
const suffix = ["a","éa","ia","ra","xa","aya","ira","elle","aé","ora","éssa"];

function generateStarName(){
    return prefix.random()+core.random()+suffix.random();
}

/* --- Mottos --- */
function generateMottoTR(){
    const p1=["Işığın","Zarafetin","Auran","Gölgen","Kalbin","Stilin"];
    const p2=["karanlığı deler","odayı değiştirir","her şeyi dönüştürür","iz bırakır","parıldar"];
    const p3=["asla kaybolmaz.","konuşmadan anlatır.","seni öne çıkarır.","tüm gözleri toplar."];
    return `${p1.random()} ${p2.random()} ve ${p3.random()}`;
}

function generateMottoEN(){
    return generateMottoTR()
        .replace("Işığın","Your light")
        .replace("Zarafetin","Your elegance")
        .replace("Auran","Your aura")
        .replace("Gölgen","Your shadow")
        .replace("Kalbin","Your heart")
        .replace("Stilin","Your style")
        .replace("karanlığı deler","cuts through darkness")
        .replace("odayı değiştirir","changes the room")
        .replace("her şeyi dönüştürür","transforms everything")
        .replace("iz bırakır","leaves a mark")
        .replace("parıldar","glows")
        .replace("asla kaybolmaz.","never fades.")
        .replace("konuşmadan anlatır.","tells without words.")
        .replace("seni öne çıkarır.","makes you stand out.")
        .replace("tüm gözleri toplar.","turns all eyes to you.");
}

/* --- Outfit --- */
const mainTR = [
    "Siyah kaşmir kaban",
    "Krem yün blazer takım",
    "Gri fitilli balıkçı kazak",
    "Taupe uzun trench coat",
];
const accTR = [
    "Altın spiral küpe",
    "İnci mini çanta",
    "Gri yün bere",
    "Gold deri eldiven"
];
const hairTR = [
    "Sleek low bun",
    "Natural wave",
    "High ponytail",
];
const shoeTR = [
    "Siyah diz üstü çizmeler",
    "Kısa topuklu deri bot",
    "Metallic heels",
];

function generateOutfitTR(){
    return `• ${mainTR.random()}
• ${accTR.random()}
• ${hairTR.random()}
• ${shoeTR.random()}`;
}

function generateOutfitEN(){
    return generateOutfitTR()
        .replace("Siyah kaşmir kaban","Black cashmere coat")
        .replace("Krem yün blazer takım","Cream wool blazer set")
        .replace("Gri fitilli balıkçı kazak","Gray ribbed turtleneck")
        .replace("Taupe uzun trench coat","Taupe long trench coat")
        .replace("Altın spiral küpe","Gold spiral earrings")
        .replace("İnci mini çanta","Pearl mini bag")
        .replace("Gri yün bere","Gray wool beanie")
        .replace("Gold deri eldiven","Gold leather gloves")
        .replace("Sleek low bun","Sleek low bun")
        .replace("Natural wave","Natural wave")
        .replace("High ponytail","High ponytail")
        .replace("Siyah diz üstü çizmeler","Black over-knee boots")
        .replace("Kısa topuklu deri bot","Low-heel leather boots")
        .replace("Metallic heels","Metallic heels");
}

/* --- Generate --- */
function generate(){
    document.getElementById("loadingText").style.opacity = 1;

    setTimeout(()=>{
        const star = generateStarName();
        const motto = (lang==="tr") ? generateMottoTR() : generateMottoEN();
        const outfit = (lang==="tr") ? generateOutfitTR() : generateOutfitEN();

        document.getElementById("starName").textContent = star + " ✦";
        document.getElementById("outputBox").textContent =
            (lang==="tr" ? "✦ Motto:\n" : "✦ Motto:\n") +
            motto + "\n\n" +
            (lang==="tr" ? "✦ MedAI Kombin Önerisi:\n" : "✦ MedAI Outfit Suggestion:\n") +
            outfit;

        document.getElementById("loadingText").style.opacity = 0;
    }, 600);
}

function toggleLang(){
    lang = (lang==="tr") ? "en" : "tr";
    generate();
}

generate();
</script>

</body>
</html>
