<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MedAI StarCard — MedaStaré</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

body {
    margin: 0;
    background: #000;
    font-family: 'Inter', sans-serif;
    color: white;
    overflow-x: hidden;
}

/* -------- BACKGROUND -------- */
.bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, #121226 0%, #000 80%);
    overflow: hidden;
    z-index: -1;
}

.bg::before {
    content: "";
    position: absolute;
    inset: -40px;
    background-image: url("https://i.ibb.co/M2nNkmS/gold-dust.png");
    opacity: 0.20;
    animation: float 22s linear infinite;
}

@keyframes float {
    0%   { transform: translateY(0); }
    100% { transform: translateY(-280px); }
}

/* -------- CARD -------- */
.card {
    width: 92%;
    max-width: 600px;
    margin: 85px auto;
    background: rgba(20,20,35,0.50);
    border-radius: 28px;
    padding: 40px 32px;

    border: 1px solid rgba(255,215,0,0.28);
    backdrop-filter: blur(14px);
    box-shadow: 0 0 55px rgba(255,215,0,0.20);

    animation: fade 0.8s ease;
    min-height: 600px; /* Kart artık kaymıyor */
}

@keyframes fade {
    from { opacity: 0; transform: translateY(25px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* -------- STAR HOLOGRAM -------- */
.star {
    width: 150px;
    height: 150px;
    margin: 0 auto 28px;

    background-image: url("https://i.ibb.co/B3TjZ0s/star-gold-holo.png");
    background-size: contain;
    background-repeat: no-repeat;

    filter: drop-shadow(0 0 20px rgba(255,215,0,0.85));
    animation: pulse 3.2s ease-in-out infinite;
}

@keyframes pulse {
    0%   { transform: scale(1); opacity: .8; }
    50%  { transform: scale(1.10); opacity: 1; }
    100% { transform: scale(1); opacity: .8; }
}

/* -------- TEXT -------- */
.loading {
    text-align: center;
    opacity: 0.75;
    font-size: 15px;
    margin-bottom: 15px;
    animation: blink 2s infinite;
}
@keyframes blink {
    0%,100% { opacity: .6; }
    50% { opacity: 1; }
}

.name {
    text-align: center;
    font-family: 'Playfair Display';
    font-size: 46px;
    color: #ffd700;
    margin-bottom: 20px;
}

.output {
    font-size: 18px;
    line-height: 1.7;
    white-space: pre-line;
    min-height: 260px;
}

/* -------- BUTTONS -------- */
.btn-box {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-top: 28px;
}

button {
    padding: 12px 30px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    font-size: 15px;

    background: linear-gradient(90deg, #ffd700, #ff6bd6);
    color: #000;
    transition: 0.22s;
}

button:hover {
    transform: scale(1.06);
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

    <div class="star"></div>

    <div class="loading" id="loadingText">MedaAI is generating your Star…</div>

    <div class="name" id="starName"></div>

    <div class="output" id="outputBox"></div>

    <div class="btn-box">
        <button onclick="generate()">Yeni Üret</button>
        <button onclick="toggleLang()">EN / TR</button>
    </div>
</div>

<script>
let lang = "tr";

/* -------- STAR NAME MOTORU -------- */
function generateStarName() {
    const prefix = ["Astra", "Ela", "Noï", "Ophira", "Luné", "Auré", "Seré", "Vea", "Mirae", "Ély", "Nai", "Véra", "Oxa"];
    const core   = ["thea", "stra", "lya", "raé", "naï", "vara", "lune", "rea", "lyra", "via", "nera"];
    const suffix = ["a", "ia", "éa", "xa", "ara", "elle", "aya", "ira", "ora"];

    return prefix.random() + core.random() + suffix.random();
}

/* -------- MOTTO MOTORU -------- */
function generateMotto() {
    const p1 = ["Işığın", "Zarafetin", "Auran", "Sessiz gücün", "Adımların", "Kalbin"];
    const p2 = ["herkesi susturur", "karanlığı deler", "odayı değiştirir", "yükselir", "parıldar"];
    const p3 = ["ve kaybolmaz.", "ve iz bırakır.", "ve dönüşüm yaratır.", "ve konuşur.", "ve seni görünür kılar."];

    return `${p1.random()} ${p2.random()} ${p3.random()}`;
}

/* -------- KOMBIN MOTORU -------- */
function generateKombin() {
    const main = ["Krem blazer takım", "White jumpsuit", "Siyah satin elbise", "Taupe trench coat", "Red drape dress", "Silver slip elbise"];
    const acc  = ["Mini gold bag", "Pearl clutch", "Crystal drop earrings", "Gold spiral küpe", "Silver hoops"];
    const hair = ["Sleek low bun", "Soft glam waves", "Wet hair look", "High elegant ponytail"];
    const shoe = ["Pointed boots", "Nude stiletto", "Clear heels", "Metallic heels"];

    return `• ${main.random()}\n• ${acc.random()}\n• ${hair.random()}\n• ${shoe.random()}`;
}

/* RANDOM PICK HELPER */
Array.prototype.random = function() {
    return this[Math.floor(Math.random() * this.length)];
};

/* ----- EN ÇEVİRİ ----- */
function translateMotto(t) {
    return t
      .replace("Işığın","Your light")
      .replace("Zarafetin","Your elegance")
      .replace("Auran","Your aura")
      .replace("Sessiz gücün","Your silent power")
      .replace("Adımların","Your steps")
      .replace("Kalbin","Your heart")
      .replace("herkesi susturur","silences everyone")
      .replace("karanlığı deler","cuts through darkness")
      .replace("odayı değiştirir","changes the room")
      .replace("yükselir","rises")
      .replace("parıldar","glows")
      .replace("ve kaybolmaz.","and never gets lost.")
      .replace("ve iz bırakır.","and leaves a mark.")
      .replace("ve dönüşüm yaratır.","and transforms everything.")
      .replace("ve konuşur.","and speaks without words.")
      .replace("ve seni görünür kılar.","and makes you seen.");
}

function translateKombin(k) {
    return k
      .replace("Krem blazer takım","Cream blazer set")
      .replace("Siyah satin elbise","Black satin dress")
      .replace("Taupe trench coat","Taupe trench coat")
      .replace("Red drape dress","Red drape dress")
      .replace("Silver slip elbise","Silver slip dress");
}

/* -------- GENERATOR -------- */
function generate() {
    document.getElementById("loadingText").style.opacity = 1;

    setTimeout(() => {
        let name = generateStarName();
        let motto = generateMotto();
        let kombin = generateKombin();

        if (lang === "en") {
            motto = translateMotto(motto);
            kombin = translateKombin(kombin);
        }

        document.getElementById("starName").textContent = name + " ✦";

        document.getElementById("outputBox").textContent =
            (lang==="tr" ? "✦ Motto:\n" : "✦ Motto:\n") +
            motto +
            "\n\n" +
            (lang==="tr" ? "✦ MedAI Kombin Önerisi:\n" : "✦ MedAI Outfit Suggestion:\n") +
            kombin;

        document.getElementById("loadingText").style.opacity = 0;
    }, 700);
}

function toggleLang() {
    lang = (lang === "tr") ? "en" : "tr";
    generate();
}

generate();
</script>

</body>
</html>
