<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MedaAI StarCard™ — MedaStaré</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Plus+Jakarta+Sans:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* ------------------------------------------------ GLOBAL */
body {
    margin: 0;
    background: #000;
    font-family: 'Plus Jakarta Sans', sans-serif;
    overflow-x: hidden;
    color: #fff;
}

/* ------------------------------------------------ BACKGROUND ANIM */
.bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, #080812 0%, #000 80%);
    overflow: hidden;
    z-index: -1;
}

.star-layer {
    position: absolute;
    width: 200%;
    height: 200%;
    background-image: url("https://i.imgur.com/9aRKjGk.png");
    background-size: cover;
    opacity: 0.22;
    animation: floatStars 35s linear infinite;
}

.star-layer:nth-child(2) {
    opacity: 0.16;
    animation-duration: 55s;
    animation-direction: reverse;
}

@keyframes floatStars {
    0% { transform: translate(-10%, -10%) rotate(0deg); }
    100% { transform: translate(-20%, -25%) rotate(1deg); }
}

/* ------------------------------------------------ CARD */
.card {
    width: 92%;
    max-width: 620px;
    margin: 140px auto;
    padding: 40px 34px;
    border-radius: 28px;

    background: rgba(15,13,25,0.55);
    border: 1px solid rgba(255,215,0,0.38);
    backdrop-filter: blur(18px);
    box-shadow: 0 0 60px rgba(255,215,0,0.22);

    animation: fadeIn 1s ease forwards;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ------------------------------------------------ TITLE */
.top-title {
    text-align: center;
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 18px;
    letter-spacing: 0.5px;
    color: #ffffff;
    text-shadow: 0 0 15px rgba(255,255,255,0.35);
}

/* ------------------------------------------------ HOLOGRAM STAR (NO IMGUR) */
.holo-star {
    width: 140px;
    height: 140px;
    margin: 0 auto 25px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,215,0,0.6), rgba(255,215,0,0.1));
    box-shadow:
        0 0 35px rgba(255,215,0,0.65),
        0 0 65px rgba(255,215,0,0.4),
        inset 0 0 25px rgba(255,215,0,0.4);
    animation: pulseStar 3s infinite ease-in-out;
}

@keyframes pulseStar {
    0% { transform: scale(1); opacity: 0.9; }
    50% { transform: scale(1.07); opacity: 1; }
    100% { transform: scale(1); opacity: 0.88; }
}

/* ------------------------------------------------ LOADING */
.loading {
    text-align: center;
    opacity: 0.7;
    font-size: 16px;
    margin-bottom: 20px;
    animation: blink 1.7s infinite;
}

@keyframes blink {
    0%,100% { opacity: .55; }
    50% { opacity: 1; }
}

/* ------------------------------------------------ STAR NAME */
.name {
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: 54px;
    margin-bottom: 25px;
    color: #ffd700;
    text-shadow: 0 0 18px rgba(255,215,0,0.9);
}

/* ------------------------------------------------ OUTPUT */
.output {
    font-size: 19px;
    line-height: 1.7;
    min-height: 240px;
}

/* ------------------------------------------------ BUTTONS */
.btn-box {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-top: 30px;
}

button {
    padding: 13px 32px;
    background: linear-gradient(90deg, #ffd700, #ff69d9);
    border-radius: 32px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    font-size: 15px;
    color: #000;
    transition: .25s;
}

button:hover {
    transform: scale(1.07);
}
</style>
</head>

<body>

<!-- BG -->
<div class="bg">
    <div class="star-layer"></div>
    <div class="star-layer"></div>
</div>

<div id="cardBox" class="card">
    <div class="top-title">MedaAI StarCard™</div>
    <div class="holo-star"></div>

    <div class="loading" id="loadingText">MedaAI is generating your Star…</div>

    <div class="name" id="starName"></div>

    <div class="output" id="outputBox"></div>

    <div class="btn-box">
        <button onclick="generate()">Yeni Üret</button>
        <button onclick="toggleLang()">EN / TR</button>
    </div>
</div>

<script>
let lang = "tr";

Array.prototype.random = function(){
    return this[Math.floor(Math.random()*this.length)];
};

/* ---- Renkli Luxe Kart Temaları ---- */
const cardColors = [
    { bg:"rgba(25,22,45,0.55)", border:"rgba(255,215,0,0.38)" },
    { bg:"rgba(35,15,45,0.55)", border:"rgba(255,105,180,0.38)" },
    { bg:"rgba(10,28,45,0.55)", border:"rgba(0,200,255,0.40)" },
    { bg:"rgba(45,22,12,0.55)", border:"rgba(255,140,0,0.40)" },
];

/* ---- Star Name ---- */
const prefix = ["A","E","O","L","Ar","El","No","Au","Ser","Vé","Lu","My","Astra","Nai","Oph","Ély"];
const core   = ["leï","stra","ria","lune","via","thea","lyra","vara","naé","raya","vona","phira","zea"];
const suffix = ["a","éa","ia","ra","xa","aya","ira","elle","aé","ora","éssa"];

function generateStarName(){
    return prefix.random()+core.random()+suffix.random();
}

/* ---- TR & EN Motto ---- */
function generateMottoTR(){
    const p1=["Işığın","Zarafetin","Auran","Gölgen","Kalbin","Stilin"];
    const p2=["karanlığı deler","odayı değiştirir","her şeyi dönüştürür","iz bırakır","parıldar"];
    const p3=["asla kaybolmaz.","konuşmadan anlatır.","seni öne çıkarır.","tüm gözleri toplar."];
    return `${p1.random()} ${p2.random()} ve ${p3.random()}`;
}

function generateMottoEN(){
    return generateMottoTR()
        .replace("Işığın","Your light")
        .replace("Zarafetin","Your elegance")
        .replace("Auran","Your aura")
        .replace("Gölgen","Your shadow")
        .replace("Kalbin","Your heart")
        .replace("Stilin","Your style")
        .replace("karanlığı deler","cuts through darkness")
        .replace("odayı değiştirir","changes the room")
        .replace("her şeyi dönüştürür","transforms everything")
        .replace("iz bırakır","leaves a mark")
        .replace("parıldar","glows")
        .replace("asla kaybolmaz.","never fades.")
        .replace("konuşmadan anlatır.","tells without words.")
        .replace("seni öne çıkarır.","makes you stand out.")
        .replace("tüm gözleri toplar.","turns all eyes to you.");
}

/* ---- Kombinler ---- */
const mainTR = [
    "Siyah kaşmir kaban",
    "Krem yün blazer takım",
    "Gri fitilli balıkçı kazak",
    "Taupe uzun trench coat",
    "Siyah deri midi etek",
    "Beyaz kaşmir kazak elbise",
];
const accTR = [
    "Altın spiral küpe",
    "İnci taşlı mini çanta",
    "Gri yün bere",
    "Gold detaylı deri eldiven",
    "Zincir detaylı çanta"
];
const hairTR = [
    "Sleek low bun",
    "Natural wave",
    "High ponytail",
    "Wet look"
];
const shoeTR = [
    "Siyah diz üstü çizmeler",
    "Kısa topuklu deri bot",
    "Metallic heels",
];

function generateOutfitTR(){
    return `• ${mainTR.random()}
• ${accTR.random()}
• ${hairTR.random()}
• ${shoeTR.random()}`;
}

function generateOutfitEN(){
    return generateOutfitTR()
        .replace("Siyah kaşmir kaban","Black cashmere coat")
        .replace("Krem yün blazer takım","Cream wool blazer set")
        .replace("Gri fitilli balıkçı kazak","Gray ribbed turtleneck")
        .replace("Taupe uzun trench coat","Taupe long trench coat")
        .replace("Siyah deri midi etek","Black leather midi skirt")
        .replace("Beyaz kaşmir kazak elbise","White cashmere knit dress")
        .replace("Altın spiral küpe","Gold spiral earrings")
        .replace("İnci taşlı mini çanta","Pearl mini bag")
        .replace("Gri yün bere","Gray wool beanie")
        .replace("Gold detaylı deri eldiven","Gold-detailed leather gloves")
        .replace("Zincir detaylı çanta","Chain-detailed bag")
        .replace("Sleek low bun","Sleek low bun")
        .replace("Natural wave","Natural wave")
        .replace("High ponytail","High ponytail")
        .replace("Wet look","Wet look")
        .replace("Siyah diz üstü çizmeler","Black over-knee boots")
        .replace("Kısa topuklu deri bot","Low-heel leather boots")
        .replace("Metallic heels","Metallic heels");
}

/* ---- Generate ---- */
function changeCardColor(){
    const c = cardColors.random();
    const card = document.getElementById("cardBox");
    card.style.background = c.bg;
    card.style.borderColor = c.border;
}

function generate() {
    document.getElementById("loadingText").style.opacity = 1;

    changeCardColor();

    setTimeout(() => {
        const star = generateStarName();
        const motto = (lang==="tr") ? generateMottoTR() : generateMottoEN();
        const outfit = (lang==="tr") ? generateOutfitTR() : generateOutfitEN();

        document.getElementById("starName").textContent = star + " ✦";
        document.getElementById("outputBox").textContent =
            (lang==="tr" ? "✦ Motto:\n" : "✦ Motto:\n") +
            motto + "\n\n" +
            (lang==="tr" ? "✦ MedAI Kombin Önerisi:\n" : "✦ MedAI Outfit Suggestion:\n") +
            outfit;

        document.getElementById("loadingText").style.opacity = 0;
    }, 750);
}

function toggleLang(){
    lang = (lang === "tr") ? "en" : "tr";
    generate();
}

generate(); // auto load
</script>

</body>
</html>
