<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MedaAI StarCard — MedaStaré</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>
/* GLOBAL */
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: #000;
    color: #fff;
    overflow-x: hidden;
}

/* BACKGROUND PARALLAX */
.bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, #0b0b1d 0%, #000 80%);
    overflow: hidden;
    z-index: -1;
}

.bg::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url("https://assets.codepen.io/1468070/Stars.svg");
    opacity: 0.23;
    animation: float1 22s linear infinite;
}
.bg::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image: url("https://assets.codepen.io/1468070/Stars.svg");
    opacity: 0.15;
    animation: float2 35s linear infinite;
}

@keyframes float1 { 
    0%{transform:translateY(0);} 
    100%{transform:translateY(-300px);} 
}
@keyframes float2 { 
    0%{transform:translateY(0);} 
    100%{transform:translateY(-450px);} 
}

/* CARD */
.card {
    width: 92%;
    max-width: 620px;
    margin: 110px auto;
    padding: 40px 32px;
    border-radius: 26px;

    background: rgba(28,25,45,0.55);
    border: 1px solid rgba(255,215,0,0.28);
    backdrop-filter: blur(14px);
    box-shadow: 0 0 50px rgba(255,215,0,0.18);

    animation: cardEnter 0.9s ease forwards;
}
@keyframes cardEnter {
    0% { transform: scale(0.94) translateY(25px); opacity:0; }
    100% { transform: scale(1) translateY(0); opacity:1; }
}

/* COLOR TRANSITION */
.color-transition {
    transition: 
        background 0.8s ease,
        border-color 0.8s ease,
        box-shadow 0.8s ease;
}

/* HOLOGRAM STAR */
.star {
    width: 150px;
    height: 150px;
    margin: 0 auto 25px;
    background-image: url("https://i.imgur.com/7X5Qw5b.png");
    background-size: contain;
    background-repeat: no-repeat;
    filter: drop-shadow(0 0 22px rgba(255,215,0,0.7));

    animation: holoStar 3s ease-in-out infinite;
}
@keyframes holoStar {
    0% { transform: scale(1) rotate(0deg); opacity:0.85; }
    50% { transform: scale(1.08) rotate(4deg); opacity:1; }
    100% { transform: scale(1) rotate(0deg); opacity:0.85; }
}

/* LOADING TEXT */
.loading {
    text-align: center;
    opacity: 0.7;
    font-size: 15px;
    margin-bottom: 15px;
    animation: blink 1.6s infinite;
}
@keyframes blink {
    0%,100%{opacity:.6;} 
    50%{opacity:1;}
}

/* STAR NAME */
.name {
    text-align: center;
    font-family: 'Playfair Display';
    font-size: 46px;
    margin-bottom: 20px;
    color: #ffd700;
    text-shadow: 0 0 12px rgba(255,215,0,0.7);
}

/* OUTPUT BOX */
.output {
    font-size: 18px;
    line-height: 1.7;
    white-space: pre-line;
    min-height: 210px;
}

/* BUTTONS */
.btn-box {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-top: 26px;
}
button {
    padding: 13px 32px;
    background: linear-gradient(90deg, #ffd700, #ff6bd6);
    border-radius: 32px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    color: #000;
    transition: .25s;
}
button:hover {
    transform: scale(1.06);
}
</style>
</head>

<body>

<div class="bg"></div>

<div id="cardBox" class="card color-transition">

    <div class="star"></div>

    <div class="loading" id="loadingText">MedaAI is generating your Star…</div>

    <div class="name" id="starName"></div>

    <div class="output" id="outputBox"></div>

    <div class="btn-box">
        <button onclick="generate()">Yeni Üret</button>
        <button onclick="toggleLang()">EN / TR</button>
    </div>
</div>

<script>
let lang = "tr";

/* RANDOM COLOR THEMES */
const cardColors = [
    { bg:"rgba(30,25,60,0.55)", border:"rgba(255,215,0,0.35)", glow:"rgba(255,215,0,0.22)" },
    { bg:"rgba(40,15,45,0.55)", border:"rgba(255,105,180,0.38)", glow:"rgba(255,105,180,0.25)" },
    { bg:"rgba(10,30,50,0.55)", border:"rgba(0,200,255,0.38)", glow:"rgba(0,200,255,0.25)" },
    { bg:"rgba(45,22,12,0.55)", border:"rgba(255,140,0,0.38)", glow:"rgba(255,140,0,0.25)" },
    { bg:"rgba(25,15,40,0.55)", border:"rgba(180,70,255,0.38)", glow:"rgba(180,70,255,0.25)" }
];

/* STAR NAME GENERATOR */
const prefix = ["A","E","O","L","Ar","El","No","Au","Ser","Vé","Lu","My","Astra","Nai","Oph","Ély"];
const core   = ["leï","stra","ria","lune","via","thea","lyra","vara","naé","raya","vona"];
const suffix = ["a","éa","ia","ra","xa","aya","ira","elle","aé","ora"];
function generateStarName(){
    return prefix.random()+core.random()+suffix.random();
}

/* MOTTO GEN */
function generateMottoTR(){
    const p1=["Işığın","Zarafetin","Auran","Sessiz gücün","Gölgen","Kalbin"];
    const p2=["karanlığı deler","herkesi susturur","odayı değiştirir","yükselir","parıldar","iz bırakır"];
    const p3=["asla kaybolmaz.","her şeyi dönüştürür.","yeni yollar açar.","konuşmadan anlatır.","seni öne çıkarır."];
    return `${p1.random()} ${p2.random()} ve ${p3.random()}`;
}
function generateMottoEN(){
    return generateMottoTR()
    .replace("Işığın","Your light")
    .replace("Zarafetin","Your elegance")
    .replace("Auran","Your aura")
    .replace("Sessiz gücün","Your silent power")
    .replace("Gölgen","Your shadow")
    .replace("Kalbin","Your heart")
    .replace("karanlığı deler","cuts through darkness")
    .replace("herkesi susturur","silences everyone")
    .replace("odayı değiştirir","changes the room")
    .replace("yükselir","rises")
    .replace("parıldar","glows")
    .replace("iz bırakır","leaves a mark")
    .replace("asla kaybolmaz.","never gets lost.")
    .replace("her şeyi dönüştürür.","transforms everything.")
    .replace("yeni yollar açar.","opens new paths.")
    .replace("konuşmadan anlatır.","tells without words.")
    .replace("seni öne çıkarır.","makes you stand out.");
}

/* OUTFIT GEN */
const mainTR=["Siyah saten elbise","Krem blazer takım","Silver slip elbise","Taupe trench coat","Beyaz jumpsuit"];
const accTR=["Gold spiral küpe","İnci çanta","Silver hoops","Mini gold bag","Crystal küpe"];
const hairTR=["Sleek low bun","Soft dalga","High ponytail","Wet hair","Natural wave"];
const shoeTR=["Nude stiletto","Clear heels","Metallic heels","Minimal topuk","Pointed boots"];

function generateOutfitTR(){
    return `• ${mainTR.random()}\n• ${accTR.random()}\n• ${hairTR.random()}\n• ${shoeTR.random()}`;
}
function generateOutfitEN(){
    return generateOutfitTR()
    .replace("Siyah saten elbise","Black satin dress")
    .replace("Krem blazer takım","Cream blazer set")
    .replace("Silver slip elbise","Silver slip dress")
    .replace("Taupe trench coat","Taupe trench coat")
    .replace("Beyaz jumpsuit","White jumpsuit")
    .replace("Gold spiral küpe","Gold spiral earrings")
    .replace("İnci çanta","Pearl bag")
    .replace("Silver hoops","Silver hoops")
    .replace("Mini gold bag","Mini gold bag")
    .replace("Crystal küpe","Crystal earrings")
    .replace("Sleek low bun","Sleek low bun")
    .replace("Soft dalga","Soft waves")
    .replace("High ponytail","High ponytail")
    .replace("Wet hair","Wet hair look")
    .replace("Natural wave","Natural waves")
    .replace("Nude stiletto","Nude stiletto")
    .replace("Clear heels","Clear heels")
    .replace("Metallic heels","Metallic heels")
    .replace("Minimal topuk","Minimal heels")
    .replace("Pointed boots","Pointed boots");
}

/* SMALL HELPER */
Array.prototype.random = function(){
    return this[Math.floor(Math.random()*this.length)];
};

/* COLOR APPLY */
function changeCardColor(){
    const c = cardColors.random();
    const card = document.getElementById("cardBox");
    card.style.background = c.bg;
    card.style.borderColor = c.border;
    card.style.boxShadow = `0 0 60px ${c.glow}`;
}

/* MAIN GENERATE */
function generate(){
    document.getElementById("loadingText").style.opacity = 1;

    changeCardColor();

    setTimeout(()=>{
        const star = generateStarName();
        const motto = (lang==="tr") ? generateMottoTR() : generateMottoEN();
        const outfit = (lang==="tr") ? generateOutfitTR() : generateOutfitEN();

        document.getElementById("starName").textContent = star+" ✦";
        document.getElementById("outputBox").textContent =
            (lang==="tr" ? "✦ Motto:\n" : "✦ Motto:\n") +
            motto +
            "\n\n" +
            (lang==="tr" ? "✦ MedAI Kombin Önerisi:\n" : "✦ MedAI Outfit Suggestion:\n") +
            outfit;

        document.getElementById("loadingText").style.opacity = 0;
    }, 700);
}

function toggleLang(){
    lang = (lang==="tr") ? "en" : "tr";
    generate();
}

generate();
</script>

</body>
</html>
