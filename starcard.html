<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MedaAI StarCard — MedaStaré</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">

<style>

/* ---------- GLOBAL ---------- */
body {
    margin: 0;
    background: #000;
    font-family: 'Inter', sans-serif;
    color: white;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
}

/* ---------- COSMIC BACKGROUND ---------- */
.bg {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle at center, #0e0e25 0%, #000 80%);
    z-index: -2;
}

.stardust {
    position: fixed;
    inset: 0;
    background: url("https://assets.codepen.io/1468070/Stars.svg");
    opacity: 0.22;
    animation: drift 22s linear infinite;
    z-index: -1;
}

@keyframes drift {
    0% { transform: translateY(0); }
    100% { transform: translateY(-350px); }
}

/* ---------- LUXURY HOLOGRAM CARD ---------- */
.card {
    width: 92%;
    max-width: 610px;
    margin: 95px auto;
    padding: 45px 32px;
    background: rgba(15,15,28,0.55);
    border-radius: 28px;
    backdrop-filter: blur(18px) saturate(180%);
    border: 1px solid rgba(255,215,0,0.35);
    box-shadow: 0 0 85px rgba(255,215,0,0.18);
    position: relative;
    animation: fadeIn .9s ease-out;

    /* SABİT yükseklik – kart zıplamasın */
    min-height: 560px;
}

@keyframes fadeIn {
    0% { opacity: 0; transform: translateY(20px); }
    100% { opacity: 1; transform: translateY(0); }
}

/* ---------- 3D HOLOGRAM STAR ---------- */
.holo-star {
    width: 150px;
    height: 150px;
    margin: 0 auto 25px;
    position: relative;
}

.holo-star::before {
    content: "";
    position: absolute;
    inset: 0;
    background: url("https://i.ibb.co/f1RhVfg/star-gold.png") no-repeat center/contain;
    filter: drop-shadow(0 0 22px rgba(255,215,0,0.9));
    opacity: 1;
    animation: starPulse 4s ease-in-out infinite;
}

/* AURA HALOSU */
.holo-star::after {
    content: "";
    position: absolute;
    inset: -40px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,215,0,0.22) 0%, transparent 70%);
    filter: blur(35px);
    animation: auraGlow 6s ease-in-out infinite;
}

@keyframes starPulse {
    0% { transform: scale(1) rotate(0deg); opacity: 0.9; }
    50% { transform: scale(1.09) rotate(4deg); opacity: 1; }
    100% { transform: scale(1) rotate(0deg); opacity: 0.9; }
}

@keyframes auraGlow {
    0%,100% { transform: scale(1); opacity: .65; }
    50% { transform: scale(1.25); opacity: 1; }
}

/* ---------- TEXTS ---------- */
.loading {
    text-align: center;
    font-size: 15px;
    opacity: .75;
    margin-top: 10px;
    animation: blink 1.8s infinite;
}
@keyframes blink {
    0%,100% { opacity: .5; }
    50% { opacity: 1; }
}

.name {
    text-align: center;
    font-family: 'Playfair Display';
    font-size: 46px;
    letter-spacing: 1px;
    color: #ffd700;
    margin-top: 18px;

    /* sabit yükseklik */
    min-height: 52px;
}

.output {
    margin-top: 25px;
    font-size: 19px;
    line-height: 1.8;
    white-space: pre-line;
    min-height: 260px; /* sabit */
}

/* ---------- BUTTONS ---------- */
.btn-box {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-top: 25px;
}

button {
    padding: 14px 30px;
    border-radius: 30px;
    border: none;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    color: #000;
    background: linear-gradient(90deg, #ffd700, #ff6bd6);
    transition: 0.25s ease;
}

button:hover {
    transform: scale(1.08);
    filter: brightness(1.15);
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="stardust"></div>

<div class="card">

    <div class="holo-star"></div>

    <div class="loading" id="loadingText">MedaAI is generating your Star…</div>

    <div class="name" id="starName"></div>

    <div class="output" id="outputBox"></div>

    <div class="btn-box">
        <button onclick="generate()">Yeni Üret</button>
        <button onclick="toggleLang()">EN / TR</button>
    </div>

</div>


<script>
let lang = "tr";

/* -------- RANDOM HELPER -------- */
Array.prototype.random = function () {
    return this[Math.floor(Math.random() * this.length)];
};

/* -------- AI-LIKE STAR NAME -------- */
function generateStarName() {
    const prefix = ["A", "E", "O", "L", "Ar", "El", "No", "Au", "Ser", "Vé", "Lu", "My", "Astra", "Ély", "Oph"];
    const core   = ["stra", "thea", "lune", "leï", "vara", "lyra", "naé", "ria", "raya", "vona"];
    const suffix = ["a", "éa", "aya", "ora", "elle", "ia", "xa"];

    return prefix.random() + core.random() + suffix.random();
}

/* -------- AI MOTTOS -------- */
function generateMotto() {
    const p1 = ["Zarafetin", "Işığın", "Auran", "Sessiz gücün", "Kalbin"];
    const p2 = ["odayı değiştirir", "herkesi susturur", "karanlığı deler", "parıldar", "yükselir"];
    const p3 = ["ve her şeyi dönüştürür.", "ve iz bırakır.", "ve yeni yollar açar.", "ve seni görünür kılar."];

    return `${p1.random()} ${p2.random()} ${p3.random()}`;
}

/* -------- AI COMBO -------- */
function generateKombin() {
    const main = [
        "Krem blazer takım",
        "Siyah satin elbise",
        "White jumpsuit",
        "Taupe trench coat",
        "Red drape dress",
        "Silver slip elbise"
    ];
    const acc = [
        "Gold spiral küpe",
        "Pearl clutch",
        "Mini gold bag",
        "Silver hoops",
        "Crystal drop earrings"
    ];
    const hair = [
        "Sleek low bun",
        "Soft glam waves",
        "High elegant ponytail",
        "Natural wavy",
        "Wet hair look"
    ];
    const shoe = [
        "Nude stiletto",
        "Clear heels",
        "Pointed boots",
        "Metallic heels",
        "Minimal topuklu"
    ];

    return `• ${main.random()}\n• ${acc.random()}\n• ${hair.random()}\n• ${shoe.random()}`;
}

/* -------- GENERATE -------- */
function generate() {
    document.getElementById("loadingText").style.opacity = 1;

    setTimeout(() => {
        let star = generateStarName();
        let motto = generateMotto();
        let kombin = generateKombin();

        document.getElementById("loadingText").style.opacity = 0;
        document.getElementById("starName").textContent = star + " ✦";
        document.getElementById("outputBox").textContent =
            `✦ Motto:\n${motto}\n\n✦ MedAI Kombin Önerisi:\n${kombin}`;

        if (lang === "en") toggleLang();
    }, 600);
}

function toggleLang() {
    lang = lang === "tr" ? "en" : "tr";

    const text = document.getElementById("outputBox").textContent;
    if (lang === "en") {
        document.getElementById("outputBox").textContent = text
            .replace("Motto","Motto")
            .replace("MedAI Kombin Önerisi","MedAI Outfit Suggestion");
    }
    generate();
}

generate();
</script>

</body>
</html>
